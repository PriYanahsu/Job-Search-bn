name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Test SSH connection to EC2
      - name: Test SSH connection
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: whoami

      # 3️⃣ Set up Java
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 4️⃣ Build the Spring Boot jar
      - name: Build Jar
        run: ./mvnw clean package -DskipTests

      # 5️⃣ Copy jar to EC2
      - name: Copy Jar to EC2
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: target/*.jar
          target: /home/ubuntu/jobsearch/

      # 6️⃣ SSH into EC2 and restart service
      - name: SSH and restart Spring Boot service
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl stop jobsearch || true
            sudo mv /home/ubuntu/jobsearch/*.jar /home/ubuntu/jobsearch/jobsearch.jar
            sudo systemctl start jobsearch
            sudo systemctl status jobsearch
